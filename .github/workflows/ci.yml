name: CI/CD DevOps EP2

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-test-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Ejecutar pruebas automatizadas
        run: mvn clean test

      - name: Compilar aplicacion
        run: mvn clean package

      - name: Construir imagen Docker
        run: docker build -t bibliotecaduoc:latest .

      - name: Validar configuracion Docker Compose
        run: docker compose config
